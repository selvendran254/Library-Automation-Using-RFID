{% extends "portal/base.html" %}
{% block title %}Login — {{ member.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card portal-card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="portal-icon mb-3"><i class="bi bi-shield-lock"></i></div>
                    <h3>Welcome, {{ member.name }}</h3>
                    <p class="text-muted mb-0">Enter your registered email to view your books and history.</p>
                </div>
                <form method="POST" action="{{ url_for('member_portal.access', token=token) }}">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="you@email.com" required autofocus>
                        <div class="form-text">Use the same email registered with the library.</div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-box-arrow-in-right"></i> View My Account
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
