{% extends "base.html" %}
{% block title %}Daily Transactions{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-calendar-day me-2"></i>Daily Transaction Report</h2>
<div class="card"><div class="card-body"><table class="table table-striped datatable">
<thead><tr><th>Date</th><th>Books Issued</th></tr></thead>
<tbody>{% for day, count in results %}<tr><td>{{ day }}</td><td><span class="badge bg-primary">{{ count }}</span></td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
{% block scripts %}<script>$(document).ready(function(){ $('.datatable').DataTable({ order: [[0,'desc']] }); });</script>{% endblock %}
